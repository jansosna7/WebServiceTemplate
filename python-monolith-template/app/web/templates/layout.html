<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }} - Admin Panel</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-slate-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">{{ project_name }}</h1>
            <div class="space-x-4">
                <a href="/admin" class="hover:text-blue-300">Dashboard</a>
                <a href="/docs" class="hover:text-blue-300">API Docs</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4 bg-white shadow-md rounded-lg">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-8 text-center text-gray-500 text-sm">
        Built with Python Monolith Template V1.0
    </footer>
</body>
</html>
