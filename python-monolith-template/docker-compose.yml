version: '3.8'

services:
  api:
    build: .
    container_name: monolith_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    # Odkomentuj poniższe, jeśli używasz bazy SQL
    #   - db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: monolith_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Odkomentuj sekcję bazy danych, gdy będziesz chciał przejść z CSV na PostgreSQL
